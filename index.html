<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEW MARITIME · PDA/FDA Automation Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --color-bg: #0a0f1e;
      --color-surface: #0f1829;
      --color-surface-elevated: #162035;
      --color-border: #1e2d4a;
      --color-accent: #c9a84c;
      --color-accent-hover: #e0bc6a;
      --color-text-primary: #e8edf5;
      --color-text-secondary: #8a9ab8;
      --color-success: #2ecc71;
      --color-warning: #f39c12;
      --color-danger: #e74c3c;
      --color-white: #ffffff;
      --shadow-elevated: 0 4px 24px rgba(0,0,0,0.4);
      --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --sans: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --display: "Barlow Condensed", Impact, sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        linear-gradient(120deg, rgba(201,168,76,0.08), transparent 34%),
        radial-gradient(circle at 12% 0%, rgba(46,204,113,0.06), transparent 26%),
        var(--color-bg);
      color: var(--color-text-primary);
      font-family: var(--sans);
    }

    body { overflow-x: hidden; }

    button,
    input,
    select,
    textarea { font: inherit; }

    button {
      border: 0;
      cursor: pointer;
      color: inherit;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 24px;
      align-items: center;
      min-height: 76px;
      padding: 16px 28px;
      background: rgba(10, 15, 30, 0.92);
      border-bottom: 1px solid var(--color-border);
      backdrop-filter: blur(18px);
    }

    .wordmark {
      display: grid;
      gap: 0;
      min-width: 170px;
      letter-spacing: 0;
    }

    .wordmark strong {
      font-family: var(--display);
      font-size: 28px;
      line-height: 0.9;
      color: var(--color-white);
    }

    .wordmark span {
      margin-top: 4px;
      color: var(--color-accent);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(5, minmax(92px, 1fr));
      gap: 8px;
      align-items: end;
    }

    .step-pill {
      position: relative;
      min-height: 44px;
      padding: 4px 6px 10px;
      color: var(--color-text-secondary);
      background: transparent;
      text-align: left;
    }

    .step-pill::after {
      content: "";
      position: absolute;
      left: 6px;
      right: 6px;
      bottom: 0;
      height: 2px;
      background: var(--color-border);
      border-radius: 10px;
      transition: background 240ms ease, transform 240ms ease;
    }

    .step-pill .step-number {
      display: block;
      margin-bottom: 4px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--color-accent);
    }

    .step-pill .step-label {
      display: block;
      overflow: hidden;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .step-pill.active {
      color: var(--color-text-primary);
    }

    .step-pill.active::after {
      background: var(--color-accent);
      transform: scaleY(1.4);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-copy {
      color: var(--color-text-secondary);
      font-family: var(--mono);
      font-size: 12px;
      white-space: nowrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 16px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      background: var(--color-surface-elevated);
      color: var(--color-text-primary);
      font-size: 13px;
      font-weight: 700;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(201,168,76,0.56);
    }

    .btn.primary {
      border-color: transparent;
      background: var(--color-accent);
      color: #111725;
    }

    .btn.primary:hover { background: var(--color-accent-hover); }

    .btn.ghost {
      background: transparent;
    }

    .btn.small {
      min-height: 32px;
      padding: 0 10px;
      font-size: 12px;
    }

    .btn.danger:hover {
      border-color: rgba(231,76,60,0.65);
      color: #ffb4ab;
    }

    .main-stage {
      width: 100%;
      max-width: 1248px;
      margin: 0 auto;
      padding: 28px;
    }

    .screen {
      animation: screenIn 300ms ease both;
    }

    @keyframes screenIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: end;
      margin-bottom: 20px;
    }

    .eyebrow {
      display: block;
      margin-bottom: 8px;
      color: var(--color-accent);
      font-family: var(--display);
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      font-family: var(--display);
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(38px, 5vw, 70px);
      line-height: 0.92;
      max-width: 850px;
    }

    h2 {
      font-size: 30px;
      line-height: 1;
    }

    h3 {
      font-size: 20px;
      line-height: 1;
    }

    .muted {
      color: var(--color-text-secondary);
    }

    .mono {
      font-family: var(--mono);
    }

    .grid-two {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 20px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: rgba(15, 24, 41, 0.88);
      box-shadow: var(--shadow-elevated);
    }

    .panel-pad {
      padding: 20px;
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--color-border);
    }

    .upload-zone {
      position: relative;
      display: grid;
      min-height: 320px;
      place-items: center;
      padding: 32px;
      overflow: hidden;
      border: 1px dashed rgba(201,168,76,0.68);
      border-radius: 6px;
      background:
        linear-gradient(135deg, rgba(201,168,76,0.08), transparent 42%),
        rgba(15, 24, 41, 0.94);
      transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .upload-zone.is-over,
    .upload-zone:hover {
      border-color: var(--color-accent-hover);
      background:
        linear-gradient(135deg, rgba(201,168,76,0.13), transparent 42%),
        var(--color-surface);
      transform: translateY(-1px);
    }

    .upload-inner {
      display: grid;
      justify-items: center;
      gap: 16px;
      max-width: 580px;
      text-align: center;
    }

    .doc-icon {
      position: relative;
      width: 84px;
      height: 108px;
      border: 1px solid rgba(232,237,245,0.22);
      border-radius: 6px;
      background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.02));
    }

    .doc-icon::before,
    .doc-icon::after {
      content: "";
      position: absolute;
      left: 16px;
      right: 16px;
      height: 2px;
      background: rgba(232,237,245,0.38);
      box-shadow: 0 16px rgba(232,237,245,0.32), 0 32px rgba(232,237,245,0.24), 0 48px rgba(232,237,245,0.18);
    }

    .doc-icon::before { top: 24px; }
    .doc-icon::after {
      top: 84px;
      background: var(--color-accent);
      box-shadow: none;
    }

    .upload-zone.parsing .doc-icon .scan-line {
      position: absolute;
      left: -7px;
      right: -7px;
      height: 3px;
      background: var(--color-accent-hover);
      box-shadow: 0 0 16px rgba(224,188,106,0.8);
      animation: scan 1.15s ease-in-out infinite;
    }

    @keyframes scan {
      0% { top: 10px; opacity: 0; }
      12% { opacity: 1; }
      86% { opacity: 1; }
      100% { top: 95px; opacity: 0; }
    }

    .upload-copy {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .sample-library {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .sample-library-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--color-text-secondary);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .sample-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .sample-card {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: rgba(10, 15, 30, 0.45);
    }

    .sample-card h3 {
      font-size: 18px;
    }

    .sample-meta {
      display: grid;
      gap: 4px;
      color: var(--color-text-secondary);
      font-family: var(--mono);
      font-size: 11px;
    }

    .sample-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .sample-actions a {
      text-decoration: none;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border: 1px solid rgba(201,168,76,0.32);
      border-radius: 4px;
      background: rgba(201,168,76,0.08);
      color: var(--color-accent-hover);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--color-text-secondary);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      outline: none;
      background: #0b1221;
      color: var(--color-text-primary);
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--color-accent);
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: rgba(10,15,30,0.6);
    }

    .segmented button {
      min-height: 34px;
      border-radius: 4px;
      background: transparent;
      color: var(--color-text-secondary);
      font-size: 12px;
      font-weight: 700;
    }

    .segmented button.active {
      background: var(--color-accent);
      color: #101725;
    }

    .context-strip {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 1px;
      overflow: hidden;
      margin-bottom: 18px;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: var(--color-border);
    }

    .context-item {
      min-height: 66px;
      padding: 12px;
      background: rgba(15,24,41,0.94);
    }

    .context-item span {
      display: block;
      margin-bottom: 6px;
      color: var(--color-text-secondary);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .context-item strong {
      display: block;
      overflow: hidden;
      font-family: var(--mono);
      font-size: 13px;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: #0b1221;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 12px;
    }

    th,
    td {
      padding: 10px 10px;
      border-bottom: 1px solid rgba(30,45,74,0.82);
      text-align: left;
      vertical-align: middle;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #111a2d;
      color: var(--color-text-secondary);
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    tbody tr:hover td {
      background: rgba(255,255,255,0.018);
    }

    td.amount,
    th.amount {
      text-align: right;
      white-space: nowrap;
    }

    td input,
    td select {
      min-height: 32px;
      padding: 6px 8px;
      font-family: var(--mono);
      font-size: 12px;
    }

    .row-actions {
      width: 44px;
      text-align: center;
    }

    .trash {
      width: 30px;
      height: 30px;
      border: 1px solid rgba(231,76,60,0.25);
      border-radius: 4px;
      background: transparent;
      color: #ffafa7;
      opacity: 0;
      transition: opacity 160ms ease, background 160ms ease;
    }

    tr:hover .trash { opacity: 1; }

    .trash:hover { background: rgba(231,76,60,0.12); }

    .grand-row td {
      border-bottom: 0;
      background: rgba(201,168,76,0.1);
      color: var(--color-accent-hover);
      font-weight: 800;
    }

    .side-list {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    .side-list-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 34px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(30,45,74,0.7);
      font-family: var(--mono);
      font-size: 12px;
    }

    .chart-box {
      min-height: 240px;
      padding: 12px;
    }

    .fallback-chart {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .fallback-bar {
      display: grid;
      gap: 5px;
      font-family: var(--mono);
      font-size: 11px;
    }

    .fallback-meter {
      height: 8px;
      overflow: hidden;
      border-radius: 10px;
      background: rgba(232,237,245,0.1);
    }

    .fallback-meter span {
      display: block;
      height: 100%;
      background: var(--color-accent);
    }

    .footer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
    }

    .document-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 20px;
      align-items: start;
    }

    .document-preview {
      min-height: 720px;
      padding: 38px;
      border-radius: 6px;
      background: var(--color-white);
      color: #172033;
      box-shadow: var(--shadow-elevated);
    }

    .doc-letterhead {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: start;
      padding-bottom: 22px;
      border-bottom: 3px solid #172033;
    }

    .doc-letterhead strong {
      display: block;
      font-family: var(--display);
      font-size: 38px;
      line-height: 0.9;
      color: #0a0f1e;
      text-transform: uppercase;
    }

    .doc-letterhead span {
      display: block;
      margin-top: 6px;
      color: #5b6680;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .doc-ref {
      text-align: right;
      font-family: var(--mono);
      font-size: 11px;
    }

    .doc-title {
      margin: 28px 0 18px;
      font-family: var(--display);
      font-size: 34px;
      color: #0a0f1e;
      text-transform: uppercase;
    }

    .doc-details {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      overflow: hidden;
      margin-bottom: 22px;
      border: 1px solid #d8deea;
      border-radius: 4px;
      background: #d8deea;
    }

    .doc-detail {
      padding: 10px;
      background: #f7f8fb;
    }

    .doc-detail span {
      display: block;
      margin-bottom: 4px;
      color: #667085;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .doc-detail strong {
      display: block;
      font-family: var(--mono);
      font-size: 11px;
      color: #172033;
    }

    .doc-table {
      border: 1px solid #d8deea;
      border-radius: 4px;
      overflow: hidden;
    }

    .doc-table table {
      color: #172033;
      font-size: 11px;
    }

    .doc-table th {
      background: #172033;
      color: #ffffff;
      border-bottom-color: #172033;
    }

    .doc-table td {
      border-bottom-color: #e5e9f1;
    }

    .doc-table td input {
      min-height: 28px;
      border-color: transparent;
      background: transparent;
      color: #172033;
      text-align: right;
    }

    .doc-table td input:enabled {
      border-color: #d8deea;
      background: #ffffff;
    }

    .doc-total {
      display: flex;
      justify-content: flex-end;
      gap: 22px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 2px solid #172033;
      font-family: var(--mono);
      font-weight: 800;
      color: #0a0f1e;
    }

    .doc-note {
      margin-top: 26px;
      padding: 12px 14px;
      border-left: 4px solid #c9a84c;
      background: #f7f3e6;
      color: #344054;
      font-size: 12px;
    }

    .signature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 48px;
      font-family: var(--mono);
      font-size: 11px;
    }

    .signature-line {
      padding-top: 12px;
      border-top: 1px solid #172033;
    }

    .controls-stack {
      display: grid;
      gap: 12px;
    }

    .control-card {
      padding: 14px;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: rgba(15,24,41,0.9);
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      min-height: 36px;
      color: var(--color-text-secondary);
      font-size: 13px;
      font-weight: 700;
    }

    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .switch input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      border-radius: 50px;
      background: var(--color-border);
      transition: background 180ms ease;
    }

    .slider::before {
      content: "";
      position: absolute;
      top: 4px;
      left: 4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffffff;
      transition: transform 180ms ease;
    }

    .switch input:checked + .slider {
      background: var(--color-accent);
    }

    .switch input:checked + .slider::before {
      transform: translateX(20px);
    }

    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .kpi {
      padding: 14px;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: rgba(15,24,41,0.9);
    }

    .kpi span {
      display: block;
      margin-bottom: 8px;
      color: var(--color-text-secondary);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .kpi strong {
      display: block;
      font-family: var(--mono);
      font-size: 19px;
    }

    .kpi.success strong { color: var(--color-success); }
    .kpi.warning strong { color: var(--color-warning); }
    .kpi.danger strong { color: var(--color-danger); }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .filter-btn {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      background: rgba(15,24,41,0.9);
      color: var(--color-text-secondary);
      font-size: 12px;
      font-weight: 800;
    }

    .filter-btn.active {
      border-color: var(--color-accent);

    const app = document.getElementById("app");

    const initialState = () => ({
      step: 0,
      context: { ...EMPTY_CONTEXT },
      pdaLoaded: false,
      fdaLoaded: false,
      parsing: false,
      parsingLabel: "",
      droppedName: "",
      docType: "PDA",

      fdaItems: [],

      comparisonFilter: "all",
      editPdaDoc: true,
      editFdaDoc: true,
      showConversion: false,
      conversionRate: 0.92,
      approvedAmounts: {}
    });

    let state = initialState();

    function money(value, currency = "USD") {
      const number = Number(value) || 0;
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency,
        minimumFractionDigits: 2
      }).format(number);
    }

    function numberFormat(value) {
      return new Intl.NumberFormat("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }).format(Number(value) || 0);
    }

    function parseAmount(value) {
      const parsed = Number(String(value).replace(/,/g, ""));
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function cloneItems(items, currency = "USD") {
      return items.map((row, index) => ({
        id: `${Date.now()}-${index}-${row[0].replace(/\W+/g, "-")}`,
        item: row[0],
        category: row[1],
        amount: row[2],
        currency,
        notes: row[3] || ""
      }));
    }

    function total(items, key = "amount") {
      return items.reduce((sum, item) => sum + (Number(item[key]) || 0), 0);
    }

    function byCategory(items) {
      return CATEGORIES.reduce((acc, category) => {
        const amount = items
          .filter(item => item.category === category)
          .reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
        if (amount > 0) acc[category] = amount;
        return acc;
      }, {});
    }

    function normalizeName(name) {
      return String(name)
        .toLowerCase()
        .replace(/\(.*?\)/g, "")
        .replace(/&/g, "and")
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function canonicalName(name) {
      const normalized = normalizeName(name);
      for (const pdaName in ITEM_ALIASES) {
        const fdaName = ITEM_ALIASES[pdaName];
        if (normalized === normalizeName(pdaName) || normalized === normalizeName(fdaName)) {
          return normalizeName(pdaName);
        }
      }
      return normalized;
    }

    function compareItems() {
      const pdaMap = new Map();
      const fdaMap = new Map();
      const order = [];

      state.pdaItems.forEach(item => {
        const key = canonicalName(item.item);
        pdaMap.set(key, item);
        order.push(key);
      });

      state.fdaItems.forEach(item => {
        const key = canonicalName(item.item);
        fdaMap.set(key, item);
        if (!order.includes(key)) order.push(key);
      });

      return order.map(key => {
        const pda = pdaMap.get(key) || null;
        const fda = fdaMap.get(key) || null;
        const pdaAmount = pda ? Number(pda.amount) || 0 : 0;
        const fdaAmount = fda ? Number(fda.amount) || 0 : 0;
        const deviation = fdaAmount - pdaAmount;
        const deviationPct = pdaAmount === 0 ? 100 : (deviation / pdaAmount) * 100;
        const absPct = Math.abs(deviationPct);
        let status = "success";
        let statusLabel = "On Target";
        let statusIcon = "🟢";
        if (!pda || !fda || absPct > 15) {
          status = "danger";
          statusLabel = "Escalate";
          statusIcon = "🔴";
        } else if (absPct > 5) {
          status = "warning";
          statusLabel = "Review";
          statusIcon = "🟡";
        }
        return {
          key,
          item: pda ? pda.item : fda.item,
          category: (fda || pda).category,
          pda,
          fda,
          pdaAmount,
          fdaAmount,
          deviation,
          deviationPct,
          status,
          statusLabel,
          statusIcon,
          note: !pda ? "New item - not in PDA" : (!fda ? "Missing in FDA" : "")
        };
      });
    }

    function varianceLevel(percent) {
      const abs = Math.abs(percent);
      if (abs > 15) return "danger";
      if (abs > 5) return "warning";
      return "success";
    }

          if (canNavigate(next)) setStep(next);

      if (step === 0) return true;
      if (step >= 1 && !state.pdaLoaded) return false;
      if (step >= 4 && !state.fdaLoaded) return false;

    function attachDrop(zoneId, type) {
      const zone = document.getElementById(zoneId);
      if (!zone) return;
      ["dragenter", "dragover"].forEach(eventName => {
        zone.addEventListener(eventName, event => {
          event.preventDefault();
          zone.classList.add("is-over");
        });
      });
      ["dragleave", "drop"].forEach(eventName => {
        zone.addEventListener(eventName, event => {
          event.preventDefault();
          zone.classList.remove("is-over");
        });
      });
      zone.addEventListener("drop", event => {
        const file = event.dataTransfer.files[0];
        simulateDroppedFile(file ? file.name : `${type}_email_body.txt`, type);
      });
    }

                    <tr>
                      <th>Item</th>
                      <th class="amount">PDA Amount</th>
                      <th class="amount">FDA Amount</th>
                      <th class="amount">Variance</th>
                      <th class="amount">Approved Amount</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${rows.map(row => `
                      <tr>
                        <td>${row.item}</td>
                        <td class="amount">${row.pda ? money(row.pdaAmount) : "—"}</td>
                        <td class="amount">${row.fda ? money(row.fdaAmount) : "—"}</td>
                        <td class="amount">${row.deviation >= 0 ? "+" : ""}${money(row.deviation)}</td>
                        <td class="amount"><input ${state.editFdaDoc ? "" : "disabled"} value="${numberFormat(state.approvedAmounts[row.key] ?? row.fdaAmount)}" data-approved="${row.key}"></td>
                      </tr>
                    `).join("")}
                  </tbody>
                </table>
              </div>
              <div class="doc-total"><span>Grand Total Approved</span><span>${money(approvedTotal(rows))}</span></div>
              <div class="doc-note">This Final DA reflects all third-party invoices received. Variances are detailed above.</div>
              <div class="signature-grid">
                <div class="signature-line">Prepared by</div>
                <div class="signature-line">Approved by</div>
                <div class="signature-line">Date</div>
              </div>
            </article>
            ${documentControlsHTML("FDA")}
          </div>
          <div class="footer-actions">
            <button class="btn" type="button" id="backComparison">← Back to Comparison</button>
            <button class="btn primary" type="button" id="completeReset">✅ Complete & Reset Demo</button>
          </div>
        </section>
      `;
      attachFdaDocumentEvents();
      document.getElementById("backComparison").addEventListener("click", () => setStep(3));
      document.getElementById("completeReset").addEventListener("click", () => {
        showToast("Demo complete", "FDA workflow reset will start in two seconds.");
        setTimeout(resetState, 2000);
      });
    }

    function approvedTotal(rows) {
      return rows.reduce((sum, row) => sum + (Number(state.approvedAmounts[row.key] ?? row.fdaAmount) || 0), 0);
    }

    function attachFdaDocumentEvents() {
      document.querySelectorAll("[data-approved]").forEach(input => {
        input.addEventListener("change", () => {
          state.approvedAmounts[input.dataset.approved] = parseAmount(input.value);
          render();
        });
      });
      const editToggle = document.getElementById("fdaEditToggle");
      if (editToggle) editToggle.addEventListener("change", () => {
        state.editFdaDoc = editToggle.checked;
        render();
      });
      attachDocumentControls("FDA");
    }

    function exportFdaExcel() {
      if (!window.XLSX) {
        showToast("Excel export unavailable", "SheetJS CDN is not loaded in this browser session.");
        return;
      }
      const rows = compareItems();
      const pdaTotal = total(state.pdaItems);
      const fdaTotal = total(state.fdaItems);
      const approved = approvedTotal(rows);
      const wb = XLSX.utils.book_new();
      const summary = [
        ["Reference", state.context.fdaReference],
        ["Vessel", state.context.vessel],
        ["IMO", state.context.imo],
        ["Port of Call", state.context.port],
        ["Operation Date", state.context.operationDate],
        [],
        ["Total PDA", pdaTotal],
        ["Total FDA", fdaTotal],
        ["Net Variance", fdaTotal - pdaTotal],
        ["Variance %", pdaTotal ? (fdaTotal - pdaTotal) / pdaTotal : 0],
        ["Grand Total Approved", approved]
      ];
      const detail = [
        ["Item", "Category", "PDA Amount", "FDA Amount", "Variance", "Variance %", "Status", "Approved Amount"],
        ...rows.map(row => [
          row.item,
          row.category,
          row.pdaAmount,
          row.fdaAmount,
          row.deviation,
          row.deviationPct / 100,
          row.statusLabel,
          state.approvedAmounts[row.key] ?? row.fdaAmount
        ])
      ];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summary), "Summary");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(detail), "Items Detail");
      XLSX.writeFile(wb, `${state.context.fdaReference}.xlsx`);
      showToast("Excel exported", "FDA workbook generated with Summary and Items Detail.");
    }

    function resetState() {
      if (categoryChart) {
        categoryChart.destroy();
        categoryChart = null;
      }
      if (varianceChart) {
        varianceChart.destroy();
        varianceChart = null;
      }
      state = initialState();
      showToast("Demo reset", "Ready for a new PDA intake.");
      render();
    }

    function render() {
      renderNav();
      if (state.step === 0) screenUploadPda();
      if (state.step === 1) screenReviewPda();
      if (state.step === 2) screenPdaDocument();
      if (state.step === 3) screenFdaComparison();
      if (state.step === 4) screenFdaDocument();
    }

    resetBtn.addEventListener("click", resetState);
    render();
  </script>
</body>
</html>
