<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEW MARITIME · Operations Platform Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    :root {
      --bg: #0a0e1a;
      --bg2: #111827;
      --bg3: #1a2235;
      --bg4: #1e2d45;
      --border: rgba(59,130,246,0.15);
      --border2: rgba(59,130,246,0.3);
      --blue: #3b82f6;
      --blue2: #60a5fa;
      --teal: #14b8a6;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --text3: #64748b;
      --gold: #fbbf24;
      --purple: #8b5cf6;
      --pink: #ec4899;
      --shadow: 0 28px 80px rgba(3, 7, 18, 0.45);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      min-width: 1200px;
      background:
        radial-gradient(circle at top left, rgba(20,184,166,0.14), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(59,130,246,0.16), transparent 34%),
        linear-gradient(180deg, #09101f 0%, var(--bg) 52%, #08101d 100%);
      color: var(--text);
      font-family: "Inter", system-ui, sans-serif;
    }

    body {
      overflow-x: auto;
    }

    body[data-lang="en"] .es,
    body[data-lang="es"] .en {
      display: none !important;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      color: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app-shell {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 24px;
      align-items: center;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      background: rgba(8, 13, 24, 0.82);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0;
      background: none;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: var(--blue2);
      font-size: 20px;
      background: linear-gradient(145deg, rgba(59,130,246,0.18), rgba(20,184,166,0.14));
      border: 1px solid var(--border2);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .brand-copy {
      display: grid;
      gap: 2px;
      text-align: left;
    }

    .brand-copy strong {
      font-size: 17px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brand-copy span {
      color: var(--text2);
      font-size: 12px;
    }

    .nav-tabs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-tab {
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.5);
      color: var(--text2);
      border: 1px solid transparent;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .nav-tab:hover {
      background: rgba(26, 34, 53, 0.9);
      color: var(--text);
      transform: translateY(-1px);
    }

    .nav-tab.active {
      background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(20,184,166,0.18));
      border-color: var(--border2);
      color: var(--blue2);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .topbar-tools {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .lang-toggle,
    .live-pill {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(17, 24, 39, 0.8);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text2);
    }

    .lang-toggle:hover {
      background: var(--bg3);
      color: var(--text);
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 0 rgba(34,197,94,0.6);
      animation: pulseDot 1.8s infinite;
    }

    @keyframes pulseDot {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.55); }
      70% { box-shadow: 0 0 0 10px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    .shell-main {
      max-width: 1480px;
      margin: 0 auto;
      padding: 28px;
    }

    .page {
      display: none;
      animation: fadeIn 0.28s ease both;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .intro-card,
    .card {
      background: linear-gradient(180deg, rgba(17,24,39,0.96), rgba(11,18,31,0.96));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .intro-card {
      position: relative;
      padding: 28px;
      margin-bottom: 22px;
    }

    .intro-card::before,
    .kpi-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--blue), transparent 72%);
    }

    .intro-grid {
      display: grid;
      grid-template-columns: 1.35fr 0.85fr;
      gap: 28px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      color: var(--teal);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    h4,
    p {
      margin: 0;
    }

    .intro-title {
      font-size: 44px;
      line-height: 1;
      letter-spacing: -0.04em;
      max-width: 800px;
    }

    .intro-copy {
      margin-top: 16px;
      max-width: 740px;
      color: var(--text2);
      line-height: 1.7;
      font-size: 15px;
    }

    .intro-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .intro-stat {
      padding: 18px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(26, 34, 53, 0.55);
    }

    .intro-stat strong {
      display: block;
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .intro-stat span {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.5;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 22px;
    }

    .kpi-card {
      position: relative;
      padding: 22px;
      min-height: 150px;
    }

    .kpi-card .label {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.5;
    }

    .kpi-card .value {
      margin-top: 18px;
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .kpi-card .subcopy {
      margin-top: 14px;
      color: var(--text3);
      font-size: 12px;
      line-height: 1.5;
    }

    .kpi-blue::before { background: linear-gradient(90deg, var(--blue), transparent 72%); }
    .kpi-teal::before { background: linear-gradient(90deg, var(--teal), transparent 72%); }
    .kpi-green::before { background: linear-gradient(90deg, var(--green), transparent 72%); }
    .kpi-amber::before { background: linear-gradient(90deg, var(--amber), transparent 72%); }
    .kpi-blue .value { color: var(--blue2); }
    .kpi-teal .value { color: #59e3d1; }
    .kpi-green .value { color: #59de7b; }
    .kpi-amber .value { color: var(--gold); }

    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.9fr) minmax(340px, 1fr);
      gap: 18px;
      margin-bottom: 18px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 22px 0;
    }

    .card-header h3 {
      font-size: 20px;
      letter-spacing: -0.03em;
    }

    .card-header p,
    .badge,
    .muted {
      color: var(--text2);
      font-size: 13px;
    }

    .badge {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.18);
      white-space: nowrap;
    }

    .map-card {
      position: relative;
      padding: 16px;
      min-height: 560px;
    }

    .map-frame {
      position: relative;
      margin-top: 12px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(59,130,246,0.12);
      background: linear-gradient(180deg, #0d1526 0%, #0a1220 100%);
    }

    .map-overlay-title {
      position: absolute;
      left: 20px;
      top: 18px;
      z-index: 2;
      color: var(--text2);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .world-map {
      display: block;
      width: 100%;
      height: auto;
    }

    .vessel-node {
      cursor: pointer;
    }

    .vessel-label {
      fill: var(--text2);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .vessel-sub {
      fill: var(--text3);
      font-size: 8px;
    }

    .map-legend {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      padding: 16px 4px 4px;
      color: var(--text2);
      font-size: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .fleet-card {
      padding-bottom: 12px;
    }

    .fleet-list {
      display: grid;
      gap: 10px;
      padding: 18px;
    }

    .fleet-item {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid transparent;
      background: rgba(17,24,39,0.3);
      transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .fleet-item:hover {
      background: var(--bg3);
      transform: translateY(-1px);
    }

    .fleet-item.selected {
      border-color: rgba(59,130,246,0.28);
      background: rgba(59,130,246,0.15);
      box-shadow: inset 2px 0 0 var(--blue);
    }

    .fleet-item.flash {
      animation: fleetFlash 0.8s ease;
    }

    @keyframes fleetFlash {
      0% { background: rgba(10,26,46,0.2); }
      35% { background: rgba(10,26,46,0.95); }
      100% { background: rgba(17,24,39,0.3); }
    }

    .fleet-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: rgba(26,34,53,0.92);
      border: 1px solid var(--border);
      font-size: 22px;
    }

    .fleet-main strong,
    .fleet-main span {
      display: block;
    }

    .fleet-main strong {
      font-size: 14px;
      margin-bottom: 6px;
    }

    .fleet-main span {
      color: var(--text2);
      font-size: 12px;
      line-height: 1.45;
    }

    .fleet-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text2);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .status-in-port {
      background: var(--green);
      box-shadow: 0 0 10px rgba(34,197,94,0.75);
    }

    .status-underway {
      background: var(--blue);
      box-shadow: 0 0 10px rgba(59,130,246,0.75);
    }

    .status-anchored {
      background: var(--amber);
      box-shadow: 0 0 10px rgba(245,158,11,0.75);
    }

    .dashboard-lower {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .list-card {
      padding-bottom: 16px;
    }

    .feed-list {
      display: grid;
      gap: 12px;
      padding: 18px 22px 6px;
    }

    .feed-item {
      display: grid;
      grid-template-columns: 12px 1fr auto;
      gap: 14px;
      align-items: start;
      padding: 14px;
      border-radius: 14px;
      background: rgba(26,34,53,0.38);
      border: 1px solid rgba(59,130,246,0.08);
    }

    .feed-item strong {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      line-height: 1.45;
    }

    .feed-item span {
      color: var(--text3);
      font-size: 12px;
    }

    .feed-accent {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 4px;
    }

    .time-pill,
    .priority-pill,
    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 11px;
      white-space: nowrap;
    }

    .priority-urgent {
      color: #ffb4b4;
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.18);
    }

    .priority-attention {
      color: #ffd98a;
      background: rgba(245,158,11,0.1);
      border-color: rgba(245,158,11,0.18);
    }

    .section-stack {
      display: grid;
      gap: 18px;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0;
      background: none;
      color: var(--text2);
      font-weight: 600;
      margin-bottom: 16px;
    }

    .back-button:hover {
      color: var(--text);
    }

    .vessel-hero {
      padding: 26px;
    }

    .vessel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
    }

    .vessel-head h2 {
      font-size: 32px;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }

    .vessel-meta {
      color: var(--text3);
      font-size: 13px;
    }

    .vessel-data-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .data-block {
      padding: 16px;
      border-radius: 14px;
      background: rgba(26,34,53,0.5);
      border: 1px solid var(--border);
    }

    .data-block span {
      display: block;
      color: var(--text3);
      font-size: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .data-block strong {
      display: block;
      font-size: 15px;
      line-height: 1.45;
    }

    .status-pill {
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
      padding: 9px 14px;
    }

    .status-pill.in-port {
      color: #9ef5b2;
      border-color: rgba(34,197,94,0.32);
      background: rgba(34,197,94,0.1);
    }

    .status-pill.underway {
      color: #9ac6ff;
      border-color: rgba(59,130,246,0.32);
      background: rgba(59,130,246,0.1);
    }

    .status-pill.anchored {
      color: #ffd28a;
      border-color: rgba(245,158,11,0.32);
      background: rgba(245,158,11,0.1);
    }

    .timeline-card,
    .comparison-card,
    .table-card,
    .builder-panel,
    .financial-card {
      padding: 22px;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .timeline-step {
      min-height: 108px;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--bg3);
    }

    .timeline-step small {
      display: block;
      color: var(--text3);
      margin-bottom: 10px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .timeline-step strong {
      display: block;
      font-size: 14px;
      margin-bottom: 12px;
      line-height: 1.45;
    }

    .timeline-step span {
      color: var(--text2);
      font-size: 12px;
      line-height: 1.5;
    }

    .timeline-step.done {
      background: rgba(34,197,94,0.08);
      border-color: rgba(34,197,94,0.18);
    }

    .timeline-step.active {
      background: rgba(59,130,246,0.1);
      border-color: rgba(59,130,246,0.22);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(360px, 0.8fr);
      gap: 18px;
    }

    .table-scroll {
      overflow: auto;
      border-radius: 14px;
      border: 1px solid rgba(59,130,246,0.1);
      background: rgba(10,14,26,0.55);
      margin-top: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 13px 16px;
      border-bottom: 1px solid rgba(59,130,246,0.08);
      text-align: left;
      font-size: 13px;
    }

    th {
      position: sticky;
      top: 0;
      background: rgba(12,19,33,0.98);
      color: var(--text2);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    td.amount,
    th.amount {
      text-align: right;
      white-space: nowrap;
    }

    .group-row td {
      background: rgba(59,130,246,0.08);
      color: var(--blue2);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 12px;
    }

    .total-row td {
      color: var(--gold);
      font-weight: 800;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .metric-card {
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(26,34,53,0.48);
    }

    .metric-card span {
      display: block;
      color: var(--text3);
      font-size: 11px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .metric-card strong {
      display: block;
      font-size: 20px;
      letter-spacing: -0.03em;
    }

    .metric-card.gold strong { color: var(--gold); }
    .metric-card.red strong { color: #ff9393; }

    .progress-panel {
      padding: 16px;
      margin-top: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(10,14,26,0.5);
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(148,163,184,0.12);
      margin: 12px 0 10px;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--teal));
    }

    .progress-panel p {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.55;
    }

    .builder-layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .builder-panel {
      position: sticky;
      top: 106px;
    }

    .field-stack {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }

    .field label {
      display: block;
      color: var(--text2);
      font-size: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 44px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid rgba(59,130,246,0.12);
      background: rgba(26,34,53,0.88);
      color: var(--text);
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: rgba(96,165,250,0.55);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.14);
    }

    .generate-btn {
      width: 100%;
      min-height: 50px;
      border-radius: 14px;
      margin-top: 8px;

    function calcLine(line, portKey, inputMT, inputCrew, inputGRT) {
      const port = pdaData[portKey];
      if (line.unit === "fixed") return line.usdBase;
      if (line.unit === "per MT") return Math.round(line.usdBase * (inputMT / port.refMT));
      if (line.unit === "per crew") return Math.round(line.usdBase * (inputCrew / port.refCrew));
      if (line.unit === "per GRT") return Math.round(line.usdBase * (inputGRT / port.refGRT));
      return line.usdBase;
    }

    function computeBuilderPreview() {
      const { vesselId, port, operation, cargoMT, grt, crew } = state.builder;
      const vessel = getVessel(vesselId);
      const portData = pdaData[port];
      const lines = portData.lines.map((line) => ({
        ...line,
        amount: calcLine(line, port, cargoMT, crew, grt)
      }));
      const grouped = groupLinesByCategory(lines, "amount");
      const total = lines.reduce((sum, line) => sum + line.amount, 0);
      const ref = `PDA-2026-00${vessel.id + 1}`;
      return {
        vessel,
        portData,
        operation,
        lines,
        grouped,
        total,
        totalEur: Math.round(total * 0.924),
        reference: ref
      };
    }

    function groupLinesByCategory(lines, amountKey) {
      const groups = {};
      lines.forEach((line) => {
        if (!groups[line.cat]) groups[line.cat] = [];
        groups[line.cat].push(line);
      });
      return Object.entries(groups).map(([category, categoryLines]) => ({
        category,
        lines: categoryLines,
        subtotal: categoryLines.reduce((sum, line) => sum + (Number(line[amountKey]) || 0), 0)
      }));
    }

    function computeComparison(vessel) {
      const portKey = vessel.pdaPort;
      const baseLines = pdaData[portKey].lines.map((line) => ({
        ...line,
        amount: line.usdBase
      }));
      const pdaTotal = baseLines.reduce((sum, line) => sum + line.amount, 0);
      const variance = comparisonVariance[portKey] || 0.03;
      const fdaTotal = Math.round(pdaTotal * (1 + variance));
      const difference = fdaTotal - pdaTotal;
      const groupedPda = groupLinesByCategory(baseLines, "amount");
      const categoryRows = groupedPda.map((group) => {
        const factor = categoryFdaFactor[group.category] || (1 + variance);
        const fdaSubtotal = Math.round(group.subtotal * factor);
        return {
          category: group.category,
          pdaSubtotal: group.subtotal,
          fdaSubtotal,
          diff: fdaSubtotal - group.subtotal
        };
      }).sort((a, b) => b.pdaSubtotal - a.pdaSubtotal).slice(0, 5);

      return {
        lines: groupedPda,
        pdaTotal,
        fdaTotal,
        variance,
        difference,
        categoryRows
      };
    }

    function unitLabel(unit) {
      const labels = {
        fixed: { en: "Fixed", es: "Fijo" },
        "per MT": { en: "Per MT", es: "Por MT" },
        "per crew": { en: "Per crew", es: "Por tripulante" },
        "per GRT": { en: "Per GRT", es: "Por GRT" }
      };
      const label = labels[unit] || { en: unit, es: unit };
      return dual(label.en, label.es);
    }

    function timelineForStatus(status) {
      const steps = [
        { labelEn: "Nomination", labelEs: "Nominación", copyEn: "Commercial confirmation received", copyEs: "Confirmación comercial recibida" },
        { labelEn: "PDA Issued", labelEs: "PDA Emitida", copyEn: "Port cost forecast sent to owner", copyEs: "Pronóstico de costos enviado al armador" },
        { labelEn: "Port Operations", labelEs: "Operación Portuaria", copyEn: "Live execution window for the call", copyEs: "Ventana operativa en ejecución" },
        { labelEn: "FDA Final", labelEs: "FDA Final", copyEn: "Final account and invoices under closure", copyEs: "Cuenta final e invoices en cierre" },
        { labelEn: "Settlement", labelEs: "Liquidación", copyEn: "Post-call balance and reconciliation", copyEs: "Balance y conciliación post escala" }
      ];

      return steps.map((step, index) => {
        let stateLabel = { en: "Pending", es: "Pendiente" };
        let cls = "";
        if (status === "in-port") {
          if (index < 2) {
            cls = "done";
            stateLabel = { en: "✓ Complete", es: "✓ Completo" };
          } else if (index === 2) {
            cls = "active";
            stateLabel = { en: "🔵 Active", es: "🔵 Activo" };
          }
        } else if (status === "underway") {
          if (index < 2) {
            cls = "done";
            stateLabel = { en: "✓ Complete", es: "✓ Completo" };
          }
        } else if (status === "anchored") {
          if (index < 3) {
            cls = index < 2 ? "done" : "active";
            stateLabel = index < 2 ? { en: "✓ Complete", es: "✓ Completo" } : { en: "🔵 Active", es: "🔵 Activo" };
          }
        }
        return { ...step, cls, stateLabel };
      });
    }

    function animateCounters() {
      document.querySelectorAll("[data-counter]").forEach((element) => {
        const target = Number(element.dataset.target);
        const format = element.dataset.format;
        const start = performance.now();
        const duration = 800;

        function formatter(value) {
          if (format === "moneyk") return `$${Math.round(value)}K`;
          return Math.round(value).toLocaleString("en-US");
        }

        function tick(now) {
          const progress = Math.min(1, (now - start) / duration);
          const eased = 1 - Math.pow(1 - progress, 3);
          element.textContent = formatter(target * eased);
          if (progress < 1) {
            requestAnimationFrame(tick);
          }
        }

        requestAnimationFrame(tick);
      });
    }

    function setLanguage(lang) {
      state.lang = lang;
      document.body.dataset.lang = lang;
      document.documentElement.lang = lang === "en" ? "en" : "es";
    }

    function updateNav() {
      document.querySelectorAll("[data-page-link]").forEach((button) => {
        button.classList.toggle("active", button.dataset.pageLink === state.page);
      });
      document.querySelectorAll(".page").forEach((page) => {
        page.classList.toggle("active", page.id === `page-${state.page}`);
      });
    }

    function setPage(page) {
      state.page = page;
      updateNav();
      if (page === "vessel") renderVesselDetail();
      if (page === "builder") renderBuilder();
      if (page === "financial") renderFinancial();
      if (page === "dashboard") renderDashboard();
    }

    function selectVessel(id) {
      state.selectedVesselId = id;
      setPage("vessel");
    }

    function startFleetFlash() {
      window.setInterval(() => {
        const items = Array.from(document.querySelectorAll(".fleet-item"));
        if (!items.length) return;
        const item = items[Math.floor(Math.random() * items.length)];
        item.classList.remove("flash");
        void item.offsetWidth;
        item.classList.add("flash");
      }, 3000);
    }

    function bindStaticEvents() {
      document.getElementById("langToggle").addEventListener("click", () => {
        setLanguage(state.lang === "en" ? "es" : "en");
      });
      document.querySelectorAll("[data-page-link]").forEach((button) => {
        button.addEventListener("click", () => setPage(button.dataset.pageLink));
      });
    }

    function init() {
      syncBuilderFromVessel(state.builder.vesselId);
      bindStaticEvents();
      renderDashboard();
      renderVesselDetail();
      renderBuilder();
      renderFinancial();
      setPage("dashboard");
      startFleetFlash();
    }

    init();
