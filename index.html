<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEW MARITIME HUB OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    :root {
      --bg: #07121d;
      --bg2: #0d1a28;
      --bg3: #122334;
      --bg4: #183049;
      --panel: rgba(13, 26, 40, 0.88);
      --panel-strong: rgba(18, 35, 52, 0.96);
      --line: rgba(122, 171, 197, 0.14);
      --line-strong: rgba(122, 171, 197, 0.28);
      --text: #f4f7fb;
      --text2: #a8bdcc;
      --text3: #6d8798;
      --sea: #44d4c8;
      --sea2: #1db7aa;
      --sky: #6daafc;
      --gold: #ffbc54;
      --red: #ff6e6e;
      --green: #42d68b;
      --orange: #ff8a53;
      --purple: #8f7dff;
      --shadow: 0 30px 90px rgba(2, 9, 16, 0.45);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      --body: "IBM Plex Sans", system-ui, sans-serif;
      --display: "Sora", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-width: 1240px;
      min-height: 100%;
      background:
        radial-gradient(circle at 10% 0%, rgba(68,212,200,0.14), transparent 30%),
        radial-gradient(circle at 90% 10%, rgba(109,170,252,0.14), transparent 34%),
        linear-gradient(180deg, #08121d 0%, #06101a 60%, #050d14 100%);
      color: var(--text);
      font-family: var(--body);
    }

    body {
      overflow-x: auto;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      color: inherit;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    p {
      margin: 0;
    }

    .app-shell {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 60;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 20px;
      align-items: center;
      padding: 18px 28px;
      backdrop-filter: blur(18px);
      background: rgba(7, 18, 29, 0.8);
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand-mark {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(145deg, rgba(109,170,252,0.24), rgba(68,212,200,0.22)),
        rgba(255,255,255,0.03);
      border: 1px solid rgba(109,170,252,0.2);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      color: var(--sky);
      font-size: 22px;
    }

    .brand-copy {
      display: grid;
      gap: 3px;
    }

    .brand-copy strong {
      font-family: var(--display);
      font-size: 18px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .brand-copy span {
      color: var(--text2);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-tabs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-tab {
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      color: var(--text2);
      border: 1px solid transparent;
      background: rgba(255,255,255,0.02);
      transition: background 0.2s ease, transform 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .nav-tab:hover {
      transform: translateY(-1px);
      background: rgba(24,48,73,0.56);
      color: var(--text);
    }

    .nav-tab.active {
      background: linear-gradient(135deg, rgba(109,170,252,0.18), rgba(68,212,200,0.16));
      border-color: var(--line-strong);
      color: var(--sky);
    }

    .topbar-tools {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .live-pill,
    .date-pill {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text2);
      font-size: 13px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 0 rgba(66,214,139,0.6);
      animation: pulseLive 1.9s infinite;
    }

    @keyframes pulseLive {
      0% { box-shadow: 0 0 0 0 rgba(66,214,139,0.5); }
      75% { box-shadow: 0 0 0 10px rgba(66,214,139,0); }
      100% { box-shadow: 0 0 0 0 rgba(66,214,139,0); }
    }

    .shell-main {
      max-width: 1540px;
      margin: 0 auto;
      padding: 28px;
    }

    .page {
      display: none;
      animation: fadePage 0.26s ease both;
    }

    .page.active {
      display: block;
    }

    @keyframes fadePage {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card,
    .hero-card {
      background: linear-gradient(180deg, rgba(13,26,40,0.97), rgba(10,20,31,0.97));
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-card {
      position: relative;
      padding: 28px;
      margin-bottom: 20px;
    }

    .hero-card::before,
    .metric-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--sea), rgba(109,170,252,0.65), transparent 80%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      color: var(--sea);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.35fr 0.85fr;
      gap: 28px;
      align-items: center;
    }

    .hero-title {
      font-family: var(--display);
      font-size: 42px;
      line-height: 1.05;
      letter-spacing: -0.04em;
      max-width: 860px;
    }

    .hero-copy {
      margin-top: 14px;
      color: var(--text2);
      line-height: 1.75;
      max-width: 800px;
      font-size: 15px;
    }

    .hero-insight-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .insight-card {
      padding: 16px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: rgba(24,48,73,0.32);
    }

    .insight-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 22px;
      font-family: var(--display);
      letter-spacing: -0.03em;
    }

    .insight-card span {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.55;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 20px;
    }

    .metric-card {
      position: relative;
      padding: 22px;
      min-height: 150px;
    }

    .metric-label {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.5;
    }

    .metric-value {
      margin-top: 18px;
      font-size: 36px;
      line-height: 1;
      font-family: var(--display);
      letter-spacing: -0.04em;
    }

    .metric-subcopy {
      margin-top: 14px;
      color: var(--text3);
      font-size: 12px;
      line-height: 1.5;
    }

    .metric-sea .metric-value { color: var(--sea); }
    .metric-sky .metric-value { color: var(--sky); }
    .metric-gold .metric-value { color: var(--gold); }
    .metric-green .metric-value { color: var(--green); }

    .content-grid {
      display: grid;
      gap: 18px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .grid-main-aside {
      display: grid;
      grid-template-columns: minmax(0, 1.65fr) minmax(320px, 0.85fr);
      gap: 18px;
      align-items: start;
    }

    .grid-wide {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(420px, 1fr);
      gap: 18px;
      align-items: start;
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 22px 0;
    }

    .card-head h3,
    .card-head h4 {
      font-family: var(--display);
      letter-spacing: -0.03em;
    }

    .card-head h3 {
      font-size: 24px;
    }

    .card-head h4 {
      font-size: 18px;
    }

    .card-head p,
    .muted {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.55;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text2);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .pill.current { color: var(--sea); border-color: rgba(68,212,200,0.24); background: rgba(68,212,200,0.08); }
    .pill.arrived { color: var(--gold); border-color: rgba(255,188,84,0.24); background: rgba(255,188,84,0.08); }
    .pill.sailed { color: var(--sky); border-color: rgba(109,170,252,0.24); background: rgba(109,170,252,0.08); }
    .pill.closed { color: var(--text3); border-color: rgba(109,135,152,0.2); background: rgba(109,135,152,0.08); }
    .pill.alert { color: #ffca89; border-color: rgba(255,138,83,0.28); background: rgba(255,138,83,0.08); }
    .pill.issue { color: #ff9f9f; border-color: rgba(255,110,110,0.28); background: rgba(255,110,110,0.08); }

    .segment-row,
    .filter-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-btn,
    .segment-btn,
    .tab-btn,
    .cta-btn,
    .link-btn {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text2);
      transition: all 0.2s ease;
    }

    .filter-btn:hover,
    .segment-btn:hover,
    .tab-btn:hover,
    .link-btn:hover {
      color: var(--text);
      background: rgba(24,48,73,0.5);
      transform: translateY(-1px);
    }

    .filter-btn.active,
    .segment-btn.active,
    .tab-btn.active {
      background: linear-gradient(135deg, rgba(68,212,200,0.16), rgba(109,170,252,0.16));
      color: var(--text);
      border-color: var(--line-strong);
    }

    .cta-btn {
      background: linear-gradient(135deg, var(--sea2), var(--sky));
      color: white;
      border-color: transparent;
      font-weight: 700;
      box-shadow: 0 20px 45px rgba(68,212,200,0.18);
    }

    .cta-btn:hover {
      transform: translateY(-1px);
    }

    .card-body {
      padding: 18px 22px 22px;
    }

    .table-wrap {
      overflow: auto;
      margin-top: 18px;
      border-radius: 18px;
      border: 1px solid rgba(122,171,197,0.1);
      background: rgba(7,18,29,0.45);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(122,171,197,0.08);
      font-size: 13px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      position: sticky;
      top: 0;
      background: rgba(13,26,40,0.98);
      color: var(--text3);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .ops-row {
      cursor: pointer;
      transition: background 0.18s ease;
    }

    .ops-row:hover {
      background: rgba(24,48,73,0.36);
    }

    .ops-row.selected {
      background: rgba(68,212,200,0.08);
      box-shadow: inset 3px 0 0 var(--sea);
    }

    .mono {
      font-family: var(--mono);
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text2);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-current { background: var(--sea); box-shadow: 0 0 12px rgba(68,212,200,0.75); }
    .status-arrived { background: var(--gold); box-shadow: 0 0 12px rgba(255,188,84,0.75); }
    .status-sailed { background: var(--sky); box-shadow: 0 0 12px rgba(109,170,252,0.75); }
    .status-closed { background: var(--text3); box-shadow: 0 0 12px rgba(109,135,152,0.55); }

    .create-case-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .mini-card {
      padding: 16px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: rgba(24,48,73,0.28);
    }

    .mini-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .mini-card p,
    .mini-card span {
      color: var(--text2);
      line-height: 1.6;
      font-size: 13px;
    }

    .field-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: var(--text3);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(122,171,197,0.14);
      background: rgba(7,18,29,0.6);
      color: var(--text);
      padding: 12px 14px;
      outline: none;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: rgba(109,170,252,0.42);
      box-shadow: 0 0 0 3px rgba(109,170,252,0.1);
    }

    .generated-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .generated-item {
      padding: 14px;
      border-radius: 16px;
      background: rgba(7,18,29,0.7);
      border: 1px solid var(--line);
    }

    .generated-item span {
      display: block;
      color: var(--text3);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .generated-item strong {
      display: block;
      font-size: 14px;
      line-height: 1.45;
    }

    .case-hero {
      padding: 24px;
    }

    .case-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
    }

    .case-top h2 {
      font-family: var(--display);
      font-size: 32px;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }

    .case-meta {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.65;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
    }

    .summary-item {
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(24,48,73,0.26);
    }

    .summary-item span {
      display: block;
      color: var(--text3);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .summary-item strong {
      display: block;
      font-size: 14px;
      line-height: 1.45;
    }

    .workspace-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .workspace-panel {
      display: none;
    }

    .workspace-panel.active {
      display: block;
      animation: fadePage 0.24s ease both;
    }

    .kv-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .kv-card {
      padding: 16px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: rgba(24,48,73,0.22);
    }

    .kv-card span {
      display: block;
      color: var(--text3);
      font-size: 11px;
      margin-bottom: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .kv-card strong {
      display: block;
      line-height: 1.55;
      font-size: 14px;
    }

    .cargo-table td,
    .cargo-table th {
      padding: 12px 14px;
    }

    .vessel-finder {
      padding: 18px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 30% 20%, rgba(68,212,200,0.12), transparent 24%),
        linear-gradient(180deg, rgba(7,18,29,0.8), rgba(10,20,31,0.8));
    }

    .map-box {
      position: relative;
      min-height: 220px;
      margin-top: 14px;
      border-radius: 16px;
      border: 1px solid rgba(122,171,197,0.14);
      background:
        linear-gradient(180deg, rgba(9,22,34,0.9), rgba(7,18,29,0.9)),
        rgba(255,255,255,0.02);
      overflow: hidden;
    }

    .map-box svg {
      display: block;
      width: 100%;
      height: 220px;
    }

    .audit-list,
    .timeline-list,
    .report-list,
    .alert-list,
    .agent-list,
    .ranking-list {
      display: grid;
      gap: 12px;
    }

    .list-row {
      display: grid;
      gap: 8px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(122,171,197,0.09);
      background: rgba(24,48,73,0.22);
    }

    .list-row strong {
      display: block;
      font-size: 14px;
    }

    .list-row span,
    .list-row small {
      color: var(--text2);
      line-height: 1.55;
      font-size: 12px;
    }

    .report-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .report-card {
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(24,48,73,0.26);
    }

    .report-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .report-card p {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.55;
      min-height: 60px;
      margin-bottom: 12px;
    }

    .funds-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .funds-box {
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(7,18,29,0.6);
    }

    .funds-box span {
      display: block;
      color: var(--text3);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .funds-box strong {
      display: block;
      font-family: var(--display);
      font-size: 28px;
      letter-spacing: -0.03em;
    }

    .swift-box {
      padding: 18px;
      margin-top: 18px;
      border-radius: 18px;
      border: 1px solid rgba(68,212,200,0.18);
      background: linear-gradient(180deg, rgba(68,212,200,0.08), rgba(24,48,73,0.14));
    }

    .swift-fields {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .ocr-box,
    .query-box,
    .sof-box,
    .intel-box {
      padding: 18px;
      border-radius: 18px;

        state.charts.exec = null;

          datasets: [{

            borderWidth: 1.5,
            borderRadius: 6

          plugins: {
            legend: { display: false }
          },
          scales: {

            },
            y: {

    function updatePages() {
      document.querySelectorAll(".nav-tab").forEach((button) => {
        button.classList.toggle("active", button.dataset.page === state.page);
      });
      document.querySelectorAll(".page").forEach((page) => {
        page.classList.toggle("active", page.id === `page-${state.page}`);
      });
      destroyCharts();
      if (state.page === "operations") renderOperations();
      if (state.page === "workspace") renderWorkspace();
      if (state.page === "database") renderDatabase();
      if (state.page === "intelligence") renderIntelligence();
      if (state.page === "management") renderManagement();
    }

    function bindNavigation() {
      document.querySelectorAll("[data-page]").forEach((button) => {
        button.addEventListener("click", () => {
          state.page = button.dataset.page;
          updatePages();
        });
      });
    }

    function init() {
      bindNavigation();
      renderOperations();
      renderWorkspace();
      renderDatabase();
      renderIntelligence();
      renderManagement();
      updatePages();
    }

    init();
  </script>
